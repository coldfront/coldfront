{% extends 'ras/base.html' %}
{% load i18n %}

{% block content %}
<c-layout.panels>
  <c-slot name="left">
    <c-card.fields :object="object" only>
      <c-card.fields.item label="{% trans 'Slug' %}">
          {{ object.slug }}
      </c-card.fields.item>

      <c-card.fields.item label="{% trans 'Color' %}">
          <c-ui.color_label :hex="object.color" />
      </c-card.fields.item>

      <c-card.fields.item label="{% trans 'Description' %}">
          {{ object.description|placeholder }}
      </c-card.fields.item>
    </c-card.fields>

    <c-card.tags :object="object" only />
  </c-slot>

  <c-slot name="right">
    <c-card.related_objects :object="object" :models="related_models" only />
    <c-card.custom_fields :object="object" only />
  </c-slot>

  <c-slot name="bottom">
    <c-layout.row>
      <c-layout.col>
        <c-card.code header="{% trans 'Resource Attribute Schema' %}">
        {{ object.schema|json }}
        </c-card.code>
      </c-layout.col>
      <c-layout.col>
        <c-card.code header="{% trans 'Allocation Attribute Schema' %}">
        {{ object.allocation_schema|json }}
        </c-card.code>
      </c-layout.col>
    </c-layout.row>
  </c-slot>
</c-layout.panels>
{% endblock %}
