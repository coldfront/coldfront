{% extends 'generic/object_edit.html' %}
{% load i18n %}

{% block alerts %}
    {{ block.super }}

        <c-alert type="warning">
            Non-superusers should generally create and modify API tokens under their <a href="{% url 'account:usertoken_list' %}"> user profile</a>.
        </c-alert>
    {% endif %}
{% endblock %}
