{% load crispy_forms_tags %}
{% load i18n %}

<form class="form-horizontal" action="." method="get">
  <div class="card">
    <div class="card-body justify-content-between py-3">
    {% crispy filter_form %}
    </div>
  </div>
  <div class="d-grid gap-2 d-md-flex justify-content-md-end">
    <button type="button" class="btn btn-outline-danger btn-float" data-reset="">
      <i class="fa-solid fa-filter-circle-xmark"></i> {% trans "Reset" %}
    </button>
    <button type="submit" class="btn btn-primary">
      <i class="fa-solid fa-magnifying-glass"></i> {% trans "Search" %}
    </button>
  </div>
</form>
