{% cotton:vars :request="request" %}
{% cotton:vars table actions model link %}

<c-card>
{% if link %}
  <div class="htmx-container table-responsive"
    hx-get="{{ link }}"
    hx-target="this"
    hx-trigger="load" hx-select=".htmx-container" hx-swap="outerHTML"></div>
{% else %}
  <c-table.htmx :table="table" :actions="actions" :id="id"  only />
{% endif %}
</c-card>
